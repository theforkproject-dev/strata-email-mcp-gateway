cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "email-mcp-gateway"
    image: "ghcr.io/theforkproject-dev/strata-ebo-mcps:tinfoil-email-gateway-013@sha256:ac8f9f46bdea4fe5d9e40d632fc987cd9d64d2e63e4d0d9f1b277ac838dc3795"
    env:
      - HOST: "0.0.0.0"
      - PORT: "8080"
      - NODE_OPTIONS: "--dns-result-order=ipv4first"
      - DATA_DIR: "/mnt/ramdisk/email-mcp"
      - PUBLIC_BASE_URL: "https://strata-email-mcp-gateway.amotivv.containers.tinfoil.dev"
      - CERTIFICATE_BASE_URL: "https://strata-email-mcp-gateway.amotivv.containers.tinfoil.dev/certificates"
      - EMAIL_PROVIDER: "resend"
      - EMAIL_FROM: "strata-mcp@theforkproject.com"
      - OAUTH_ISSUER: "https://strata-email-mcp-gateway.amotivv.containers.tinfoil.dev"
      - OAUTH_STORE_BACKEND: "dynamodb"
      - OAUTH_DYNAMODB_TABLE: "strata-oauth-poc-oauth-store-345337478194"
      - OAUTH_DYNAMODB_AWS_REGION: "us-east-2"
      - OAUTH_DYNAMODB_TTL_ATTRIBUTE: "ttl"
      - OAUTH_REFRESH_TOKEN_TTL_SECONDS: "604800"
      - CERTIFICATE_BUNDLE_STORE_BACKEND: "s3-cloudfront"
      - CERTIFICATE_BUNDLE_AWS_REGION: "us-east-2"
      - CERTIFICATE_BUNDLE_S3_BUCKET: "strata-certificate-bundles-poc-345337478194"
      - CERTIFICATE_BUNDLE_S3_PREFIX: "certificates"
      - CERTIFICATE_BUNDLE_PUBLIC_BASE: "https://d33vpkebicuw51.cloudfront.net/certificates"
      - CERTIFICATE_BUNDLE_LOCK_MODE: "GOVERNANCE"
      - CERTIFICATE_BUNDLE_PUBLISH_REQUIRED: "true"
      - WITNESS_URLS: "strata-witness-poc-1=https://strata-witness-poc-1.amotivv.containers.tinfoil.dev"
      - WITNESS_THRESHOLD: "1"
      - GATEWAY_SIGNED_WITNESS_REQUESTS_ENABLED: "true"
      - GATEWAY_ID: "gateway:strata-poc-demo"
      - GATEWAY_KEY_ID: "gateway:strata-poc-demo:epoch-tinfoil-001"
      - WITNESS_EPOCH_ID: "wit_epoch_tinfoil_poc_003"
      - REGISTRY_EPOCH_ID: "registry_epoch_tinfoil_poc_003"
      - WITNESS_WORKFLOW_ID: "email.send"
      - POLICY_WITNESS_URLS: "p1=https://strata-email-policy-witness-1.fly.dev,p2=https://strata-email-policy-witness-2.fly.dev,p3=https://strata-email-policy-witness-3.fly.dev"
      - POLICY_WITNESS_THRESHOLD: "2"
      - REGISTRY_URL: "https://strata-email-registry.fly.dev"
      - REGISTRY_EPOCH_DIGEST: "cc0eecd5174ef78d8779793b0b7573de58a3bc8d02e68ee91f10a8f6fec92a09"
      - REGISTRY_TRUST_ANCHOR_KEY_ID: "registry-authority:email-demo"
      - REGISTRY_TRUST_ANCHOR_PUBLIC_KEY_PEM_BASE64: "LS0tLS1CRUdJTiBQVUJMSUMgS0VZLS0tLS0KTUNvd0JRWURLMlZ3QXlFQUN2empUb1lvMllNQjlMVnJBZ2ZpeGRvOTBOdXFZeElCekZyclJkZjB1dTQ9Ci0tLS0tRU5EIFBVQkxJQyBLRVktLS0tLQo="
      - POLICY_BUNDLE_URL: "https://strata-email-registry.fly.dev/policies/epochs/email-policy-epoch-001"
      - POLICY_BUNDLE_DIGEST: "1c5a90c054c5011e93512f155caa937ecf08107a7f8ccd4de85aea8c14c3fffa"
      - GATEWAY_TINFOIL_CONTAINER_NAME: "strata-email-mcp-gateway"
      - GATEWAY_TINFOIL_CONFIG_REPO: "theforkproject-dev/strata-email-mcp-gateway"
      - GATEWAY_TINFOIL_CONFIG_TAG: "v0.1.0-email-gateway.17"
      - GATEWAY_TINFOIL_IMAGE_DIGEST: "sha256:ac8f9f46bdea4fe5d9e40d632fc987cd9d64d2e63e4d0d9f1b277ac838dc3795"
      - GATEWAY_TINFOIL_ATTESTATION_URL: "https://strata-email-mcp-gateway.amotivv.containers.tinfoil.dev/.well-known/tinfoil-attestation"
      - GATEWAY_TINFOIL_ATTESTATION_REQUIRED: "true"
      - L1_TINFOIL_WITNESS_ID: "strata-witness-poc-1"
      - L1_TINFOIL_CONTAINER_NAME: "strata-witness-poc-1"
      - L1_TINFOIL_CONFIG_REPO: "theforkproject-dev/strata-witness-poc-1"
      - L1_TINFOIL_CONFIG_TAG: "v0.1.0-witness-poc.4"
      - L1_TINFOIL_IMAGE_DIGEST: "sha256:724aa1e7a2680018f277907cb376c7f2d11df5acdd1a81c4bb0b747f6bc70a35"
      - L1_TINFOIL_ATTESTATION_DIGEST: "5b84a7c9f8e829dd664492d7452278e4ba421a7c8c5748f39573f86e8d53d649"
      - L1_TINFOIL_ATTESTATION_URL: "https://strata-witness-poc-1.amotivv.containers.tinfoil.dev/.well-known/tinfoil-attestation"
      - L1_WITNESS_REGISTRY_POINTER_URL: "https://d2oeah1vhl8c0o.cloudfront.net/registry/witness/current.json"
      - L1_WITNESS_REGISTRY_TRUST_ANCHORS_URL: "https://d2oeah1vhl8c0o.cloudfront.net/registry/witness/trust-anchors.json"
      - TENANT_ID: "default"
      - OPERATOR_ID: "operator:amotivv-demo"
      - OPERATOR_ADMISSION_KEY_ID: "operator-admission:amotivv-demo"
    secrets:
      - MCP_SESSION_SECRET
      - RESEND_API_KEY
      - OAUTH_CONSENT_PASSWORD_SHA256
      - OAUTH_DYNAMODB_AWS_ACCESS_KEY_ID
      - OAUTH_DYNAMODB_AWS_SECRET_ACCESS_KEY
      - CERTIFICATE_BUNDLE_AWS_ACCESS_KEY_ID
      - CERTIFICATE_BUNDLE_AWS_SECRET_ACCESS_KEY
      - GATEWAY_KEY_JSON
      - OPERATOR_ADMISSION_KEY_JSON
    command: ["node", "src/server.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: always

shim:
  upstream-port: 8080
  paths:
    - /health
    - /mcp
    - /certificates/*
    - /.well-known/*
    - /oauth/*
